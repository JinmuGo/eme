name: release

on:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ github.event_name == 'pull_request' && 'release --snapshot --skip=publish --clean' || 'release --clean' }}
        env:
          # The eme release uses the auto-provided token (has contents:write on this repo).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The cross-repo Homebrew formula push uses the PAT (write access to homebrew-tap).
          TAP_GITHUB_TOKEN: ${{ secrets.TOKEN }}
